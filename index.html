<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Homework 6</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.rtl.min.css"
          integrity="sha384-gXt9imSW0VcJVHezoNQsP+TNrjYXoGcrqBZJpry9zJt8PCQjobwmhMGaDHTASo9N" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="apple.ico"></head>
<body>

<div class="loader-mask">
    <div class="loader"></div>
</div>

<div class="container pt-4 text-center">

    <img src="GitHub-Mark-Light-64px.png" alt="logo" class="logo">
    <div class="js-user-img text-center"><img alt="avatar"></div>
    <div class="js-user-info text-center fs-2 ">
        Имя пользователя
    </div>
    <div class="js-user-follower text-center"></div>
    <div class="fs-7 pt-3">Дата создания аккаунта: <span class="js-date-creation"></span></div>
    <div class="city pt-3">Место проживания: Черкассы</div>
    <div class="repositories pt-3">
        <div class="repos-text">Доступные репозитории (для подробной информации нажмите на имя репозитория)</div>
        <div class="out d-flex pt-5 justify-content-around"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
